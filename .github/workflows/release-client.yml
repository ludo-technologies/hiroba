# Build Hiroba desktop installers and upload them to the GitHub Release for the tag.
#
# Usage:
#   1. Bump is optional — the workflow syncs client version from the tag (v0.2.0 → 0.2.0).
#   2. git tag v0.1.0 && git push origin v0.1.0
#   3. Wait for all matrix jobs; assets appear on the Release page.
#
# macOS signing + notarization (REQUIRED for macOS releases):
# Keeping every release under the same Team ID also preserves access to the
# session token stored in Keychain across auto-updates.
#   APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#
# Updater artifact signing (REQUIRED — bundle.createUpdaterArtifacts is on, so
# the build fails loudly if these secrets are missing; no unsigned releases):
#   TAURI_SIGNING_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY_PASSWORD
# Generate the keypair with `npm run tauri signer generate`; the matching
# public key lives in tauri.conf.json (plugins.updater.pubkey).

name: Release desktop client

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-client-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Official installers: macOS + Windows only. Linux desktop is best-effort
        # (build from source); not a first-class release target.
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Set app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          VERSION="$VERSION" node <<'NODE'
          const fs = require('fs');
          const v = process.env.VERSION;
          for (const path of ['client/package.json', 'client/src-tauri/tauri.conf.json']) {
            const json = JSON.parse(fs.readFileSync(path, 'utf8'));
            json.version = v;
            fs.writeFileSync(path, `${JSON.stringify(json, null, 2)}\n`);
          }
          const cargoPath = 'client/src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          fs.writeFileSync(
            cargoPath,
            cargo.replace(/^version = ".*"/m, `version = "${v}"`)
          );
          NODE

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Require stable macOS signing identity
        if: runner.os == 'macOS'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for name in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "Missing required macOS release secret: $name" >&2
              exit 1
            fi
          done

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Bake the hosted-service URLs into the distributed app. Without
          # these the frontend build fails (vite.config.ts) rather than
          # shipping a binary that points at 127.0.0.1.
          VITE_HIROBA_SERVER: wss://ws.hirobaoffice.com/ws
          VITE_HIROBA_AUTH_SERVER: https://auth.hirobaoffice.com
          # Updater artifact signing — createUpdaterArtifacts makes the build
          # fail if the key is missing, so an unsigned release can't ship.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: client
          tagName: ${{ github.ref_name }}
          releaseName: Hiroba ${{ github.ref_name }}
          releaseBody: |
            Desktop installers for Hiroba ${{ github.ref_name }}.

            After installing, open an invite link or point the app at your server.
            Server self-hosting: [docs/SELF_HOSTING.md](https://github.com/${{ github.repository }}/blob/main/docs/SELF_HOSTING.md)
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          # Attach latest.json so installed apps can discover this release
          # via the updater endpoint (…/releases/latest/download/latest.json).
          includeUpdaterJson: true
          args: ${{ matrix.args }}

      - name: Verify macOS app signature
        if: runner.os == 'macOS'
        shell: bash
        env:
          EXPECTED_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH="$(find client/src-tauri/target -path '*/bundle/macos/Hiroba.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Built Hiroba.app was not found" >&2
            exit 1
          fi
          codesign --verify --deep --strict "$APP_PATH"
          ACTUAL_TEAM_ID="$(codesign -dv --verbose=4 "$APP_PATH" 2>&1 | sed -n 's/^TeamIdentifier=//p')"
          if [ "$ACTUAL_TEAM_ID" != "$EXPECTED_TEAM_ID" ]; then
            echo "Unexpected signing Team ID: $ACTUAL_TEAM_ID" >&2
            exit 1
          fi
